<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo: Pegue a Estrela!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Pegue as Estrelas! 🌟</h1>
        <p>Clique no máximo de estrelas que conseguir antes que o tempo acabe!</p>

        <div class="info-bar">
            <div class="info-box">Pontos: <span id="score">0</span></div>
            <div class="info-box">Tempo: <span id="time">30</span>s</div>
        </div>

        <div class="game-area" id="game-area">
            
            <div class="game-over-screen" id="game-over">
                <h2>Fim de Jogo! 🎮</h2>
                <p>Você conseguiu pegar <span id="final-score">0</span> estrelas!</p>
                <button class="btn-start" id="btn-restart">Jogar Novamente</button>
            </div>

            <div class="start-screen" id="start-screen">
                <button class="btn-start" id="btn-start">Iniciar Jogo</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
